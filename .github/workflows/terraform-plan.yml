name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - ".terraform.lock.hcl"
      - ".github/workflows/**"

env:
  AWS_REGION: us-east-2
  TF_CLI_ARGS_init: -lockfile=readonly
  TF_CLI_ARGS_plan: -input=false -no-color

concurrency:
  group: terraform-plan
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::628639830692:role/wow-infra-github-terraform-plan
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: wow-infra-plan-${{ github.run_id }}

      - name: Terraform Plan
        uses: thekbb/terraform-plan-commenter-action@v1
        with:
          terraform-version: "1.14.6"
