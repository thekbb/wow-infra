version: "3"

env:
  AWS_REGION: "${AWS_REGION:-us-east-2}"

vars:
  TF_DIR: "."

silent: false

tasks:
  ci:
    desc: Run all repository CI checks.
    cmds:
      - task: md:lint
      - task: tf:ci
      - task: compose:ci

  md:lint:
    desc: Lint root Markdown files.
    cmds:
      - markdownlint ./*.md

  compose:ci:
    desc: Run Docker Compose CI checks.
    cmds:
      - task: compose:lint
      - task: compose:validate

  compose:lint:
    desc: Lint Docker Compose YAML.
    cmds:
      - yamllint docker-compose.yml

  compose:validate:
    desc: Validate Docker Compose configuration.
    cmds:
      - docker compose -f docker-compose.yml config -q

  tf:lock:
    desc: Refresh Terraform provider lock file for local macOS and Linux x86_64.
    cmds:
      - terraform -chdir={{.TF_DIR}} providers lock -platform=${TF_LOCK_DARWIN_PLATFORM:-darwin_arm64} -platform=${TF_LOCK_LINUX_PLATFORM:-linux_amd64}

  tf:fmt:
    desc: Format Terraform files.
    cmds:
      - terraform -chdir={{.TF_DIR}} fmt -recursive

  tf:fmt-check:
    desc: Check Terraform formatting without changing files, failing if change needed.
    cmds:
      - terraform -chdir={{.TF_DIR}} fmt -check -recursive

  tf:lint:
    desc: Run tflint.
    cmds:
      - tflint --chdir={{.TF_DIR}}

  tf:validate:
    desc: Terraform validate.
    deps:
      - tf:init
    cmds:
      - terraform -chdir={{.TF_DIR}} validate

  tf:ci:
    desc: Run Terraform CI checks.
    cmds:
      - task: tf:fmt-check
      - task: tf:validate
      - task: tf:lint

  tf:init:
    desc: Terraform init.
    cmds:
      - terraform -chdir={{.TF_DIR}} init

  tf:plan:
    desc: Terraform plan.
    deps:
      - tf:init
      - tf:fmt
    cmds:
      - terraform -chdir={{.TF_DIR}} plan

  tf:apply:
    desc: Terraform apply.
    deps:
      - tf:plan
    cmds:
      - terraform -chdir={{.TF_DIR}} apply
