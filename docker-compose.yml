services:
  database:
    image: mysql:8.0
    container_name: acore-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute 'SHOW DATABASES;'"]
      interval: 5s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  client-data:
    image: acore/ac-wotlk-client-data:master
    container_name: acore-client-data
    volumes:
      - client-data:/azerothcore/env/dist/data

  db-import:
    image: acore/ac-wotlk-db-import:master
    container_name: acore-db-import
    depends_on:
      database:
        condition: service_healthy
    environment:
      AC_DISABLE_INTERACTIVE: "1"
      AC_DATA_DIR: /azerothcore/env/dist/data
      AC_LOGS_DIR: /azerothcore/env/dist/logs
      AC_LOGIN_DATABASE_INFO: database;3306;root;password;acore_auth
      AC_WORLD_DATABASE_INFO: database;3306;root;password;acore_world
      AC_CHARACTER_DATABASE_INFO: database;3306;root;password;acore_characters
      AC_CLOSE_IDLE_CONNECTIONS: "0"
    volumes:
      - client-data:/azerothcore/env/dist/data

  authserver:
    image: acore/ac-wotlk-authserver:master
    container_name: acore-auth
    depends_on:
      database:
        condition: service_healthy
      client-data:
        condition: service_completed_successfully
      db-import:
        condition: service_completed_successfully
    ports:
      - "3724:3724"
    environment:
      AC_LOGS_DIR: /azerothcore/env/dist/logs
      AC_TEMP_DIR: /azerothcore/env/dist/temp
      AC_LOGIN_DATABASE_INFO: database;3306;root;password;acore_auth
    restart: unless-stopped

  worldserver:
    image: acore/ac-wotlk-worldserver:master
    container_name: acore-world
    depends_on:
      database:
        condition: service_healthy
      client-data:
        condition: service_completed_successfully
      db-import:
        condition: service_completed_successfully
    ports:
      - "8085:8085"
    environment:
      AC_DATA_DIR: /azerothcore/env/dist/data
      AC_LOGS_DIR: /azerothcore/env/dist/logs
      AC_LOGIN_DATABASE_INFO: database;3306;root;password;acore_auth
      AC_WORLD_DATABASE_INFO: database;3306;root;password;acore_world
      AC_CHARACTER_DATABASE_INFO: database;3306;root;password;acore_characters
      AC_CLOSE_IDLE_CONNECTIONS: "0"
    volumes:
      - client-data:/azerothcore/env/dist/data:ro
    restart: unless-stopped

volumes:
  mysql-data:
  client-data:
